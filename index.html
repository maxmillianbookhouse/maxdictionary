<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>핵심 과학·수학 용어 사전 | Maxmillian Bookhouse</title>
<meta name="description" content="초등 과학·수학 핵심용어 한·영 사전 — 발음 듣기, 검색, A–Z 찾아보기">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --cream:#FBE9B3; --cream-soft:#FDF4DC; --mustard:#C99020; --dark:#8C6E2E;
  --ink:#2b2b2b; --gray:#8a8a8a; --line:#ede3cd; --bg:#fffdf7; --chip:#f1f0ec;
  --display:'Jua',sans-serif; --en:'Lexend',sans-serif; --ko:'Pretendard',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
body{font-family:var(--ko);background:var(--bg);color:var(--ink);line-height:1.5;
  word-break:keep-all;-webkit-font-smoothing:antialiased}
.wrap{max-width:760px;margin:0 auto;padding:0 18px}

header.top{background:var(--cream);border-bottom:3px solid var(--mustard)}
.top .wrap{padding:30px 18px 26px}
.eyebrow{display:inline-block;font-family:var(--ko);font-weight:700;font-size:12px;color:var(--dark);
  letter-spacing:.5px;border:1.5px solid var(--mustard);border-radius:999px;padding:3px 13px;margin-bottom:14px}
h1{font-family:var(--display);font-size:30px;color:var(--dark);line-height:1.2}
h1 b{color:var(--mustard)}
.sub{font-family:var(--en);font-size:13px;color:#a98b46;margin-top:6px}
.note{display:inline-flex;align-items:center;gap:6px;font-family:var(--ko);font-size:12px;font-weight:500;color:var(--dark);background:rgba(255,255,255,.55);border:1px solid var(--mustard);border-radius:999px;padding:4px 12px;margin-top:14px}

.controls{position:sticky;top:0;z-index:20;background:var(--bg);
  border-bottom:1px solid var(--line);padding-top:12px}
.tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:11px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;font-family:var(--ko);font-weight:700;font-size:14px;color:var(--dark);
  background:var(--cream-soft);border:1px solid var(--line);border-radius:999px;
  padding:7px 16px;cursor:pointer;white-space:nowrap;transition:.15s}
.tab:hover{background:var(--cream)}
.tab[aria-selected="true"]{background:var(--mustard);color:#fff;border-color:var(--mustard)}
.tab .en{font-family:var(--en);font-weight:500;font-size:11px;opacity:.8;margin-left:5px}
.searchrow{display:flex;gap:10px;align-items:center;padding-bottom:12px}
.search{flex:1;display:flex;align-items:center;gap:9px;background:#fff;border:1.5px solid var(--line);
  border-radius:12px;padding:9px 14px}
.search:focus-within{border-color:var(--mustard)}
.search svg{flex:0 0 auto;color:var(--gray)}
.search input{flex:1;border:0;outline:0;font-family:var(--ko);font-size:15px;background:transparent}
.count{font-family:var(--en);font-size:12px;color:var(--gray);white-space:nowrap}

.layout{display:flex;gap:14px;align-items:flex-start}
main{flex:1;min-width:0;padding:8px 0 80px}
.rail{position:sticky;top:128px;flex:0 0 auto;display:flex;flex-direction:column;gap:1px;
  padding-top:14px;max-height:calc(100vh - 140px);overflow:auto;scrollbar-width:none}
.rail::-webkit-scrollbar{display:none}
.rail button{font-family:var(--en);font-weight:600;font-size:11px;color:var(--dark);
  background:none;border:0;width:22px;height:20px;border-radius:5px;cursor:pointer;opacity:.85}
.rail button:hover{background:var(--cream)}
.rail button:disabled{opacity:.22;cursor:default}

.alpha{display:flex;align-items:center;justify-content:space-between;background:var(--cream-soft);
  border-radius:8px;padding:6px 14px;margin:18px 0 4px;scroll-margin-top:124px}
.alpha:first-child{margin-top:6px}
.alpha .L{font-family:var(--en);font-weight:700;font-size:18px;color:var(--mustard)}
.alpha .n{font-family:var(--en);font-size:11px;color:var(--gray)}

.entry{padding:16px 4px 15px;border-bottom:1px solid var(--line)}
.headline{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.term{font-family:var(--en);font-weight:700;font-size:21px;color:var(--dark)}
.btns{display:inline-flex;gap:6px;align-items:center}
.play{width:30px;height:30px;border-radius:50%;border:0;background:var(--mustard);color:#fff;
  display:grid;place-items:center;cursor:pointer;transition:.15s}
.play:hover{background:var(--dark)}
.play:active{transform:scale(.92)}
.slow{font-family:var(--ko);font-weight:600;font-size:11px;color:var(--gray);background:var(--chip);
  border:0;border-radius:999px;padding:4px 10px;cursor:pointer;transition:.15s}
.slow:hover{background:#e6e4dd;color:var(--ink)}
.ch{margin-left:auto;font-family:var(--en);font-size:11px;color:var(--gray);
  border:1px solid var(--line);border-radius:6px;padding:2px 8px;white-space:nowrap}
.phon{font-family:var(--ko);font-size:13px;color:var(--gray);margin-top:5px}
.phon .pos{font-family:var(--en);font-style:italic;margin-left:7px}
.endef{font-family:var(--en);font-size:14.5px;color:var(--ink);margin-top:7px;line-height:1.45}
.kodef{font-size:14.5px;color:#5e5340;margin-top:3px}
.kodef .kw{font-weight:700;color:var(--ink)}
.kodef .kp{color:var(--gray);font-size:12.5px}

.iab{position:relative;z-index:60;display:flex;align-items:center;gap:10px;
  background:var(--dark);color:#fff;padding:11px 15px;font-family:var(--ko);font-size:13.5px}
.iab-msg{flex:1;line-height:1.45}
.iab-msg small{display:block;opacity:.85;font-size:11.5px;margin-top:2px;font-weight:400}
.iab-btn{flex:0 0 auto;background:#fff;color:var(--dark);font-weight:700;border:0;
  border-radius:8px;padding:8px 13px;font-size:13px;cursor:pointer;font-family:var(--ko)}
.iab-btn:active{transform:scale(.96)}
.iab-x{flex:0 0 auto;background:transparent;color:#fff;border:0;font-size:15px;cursor:pointer;opacity:.85;padding:4px}
.empty{text-align:center;color:var(--gray);font-size:15px;padding:60px 10px}
footer{border-top:1px solid var(--line);padding:22px 0 40px;text-align:center}
footer .wrap{font-family:var(--en);font-size:12px;color:var(--gray)}

@media (max-width:640px){
  h1{font-size:24px}
  .rail{display:none}
  .term{font-size:19px}
}
</style>
</head>

<script>
const DATA = [{"id": "chemistry", "en": "Chemistry", "ko": "화학", "count": 48, "entries": [{"en": "acidic", "ipa": "/əˈsɪdɪk/", "pos": "adjective", "endef": "Having the property of an acid.", "ko": "산성의", "kodef": "산성을 띠는 것을 말해요.", "ch": 16}, {"en": "basic", "ipa": "/ˈbeɪsɪk/", "pos": "adjective", "endef": "Having the property of a base.", "ko": "염기성의", "kodef": "염기성을 띠는 것을 말해요.", "ch": 16}, {"en": "boiling", "ipa": "/ˈbɔɪlɪŋ/", "pos": "noun", "endef": "When water gets hot enough, water vapor forms quickly throughout all of the water.", "ko": "끓음", "kodef": "물이 충분히 뜨거워져서 물 전체에서 빠르게 수증기가 만들어지는 것을 말해요.", "ch": 7}, {"en": "boiling point", "ipa": "/ˈbɔɪlɪŋ pɔɪnt/", "pos": "noun", "endef": "The temperature at which a liquid starts to boil.", "ko": "끓는점", "kodef": "액체가 끓기 시작하는 온도를 말해요.", "ch": 7}, {"en": "carbon dioxide", "ipa": "/ˈkɑrbən daɪˈɑkˌsaɪd/", "pos": "noun", "endef": "A gas that comes out when we breathe out. It has the property of putting out fire.", "ko": "이산화탄소", "kodef": "우리가 숨을 내쉴 때 나오는 기체예요. 불을 끄는 성질이 있어요.", "ch": 19}, {"en": "combustion", "ipa": "/kəmˈbəsʧən/", "pos": "noun", "endef": "When a substance meets oxygen and burns.", "ko": "연소", "kodef": "물질이 산소와 만나서 타는 현상을 말해요.", "ch": 20}, {"en": "concentration", "ipa": "/ˌkɑnsənˈtreɪʃən/", "pos": "noun", "endef": "The amount of solute dissolved in a certain amount of solvent.", "ko": "농도", "kodef": "일정 양의 용매에 용질이 얼마나 많이 녹아 있는지를 말해요.", "ch": 15}, {"en": "condensation", "ipa": "/ˌkɑndənˈseɪʃən/", "pos": "noun", "endef": "The process of a gas changing into a liquid.", "ko": "응결", "kodef": "기체가 액체로 변하는 현상을 말해요.", "ch": 6}, {"en": "condense", "ipa": "/kənˈdɛns/", "pos": "verb", "endef": "To change from a gas into a liquid.", "ko": "응결하다", "kodef": "기체가 액체로 변하는 것을 말해요.", "ch": 8}, {"en": "dissolve", "ipa": "/dɪˈzɑlv/", "pos": "verb", "endef": "When a substance mixes into water and can no longer be seen.", "ko": "녹다", "kodef": "물질이 물에 섞여서 보이지 않게 되는 것을 말해요.", "ch": 13}, {"en": "dissolving", "ipa": "/dɪˈzɔlvɪŋ/", "pos": "noun", "endef": "When a solute mixes evenly into a solvent and can no longer be seen.", "ko": "용해", "kodef": "용질이 용매에 녹아서 골고루 섞이는 현상을 말해요.", "ch": 12}, {"en": "evaporate", "ipa": "/ɪˈvæpərˌeɪt/", "pos": "verb", "endef": "To change from a liquid into a gas.", "ko": "증발하다", "kodef": "액체가 기체로 변하는 것을 말해요.", "ch": 8}, {"en": "evaporation", "ipa": "/ɪˌvæpərˈeɪʃən/", "pos": "noun", "endef": "The process of a liquid changing into a gas.", "ko": "증발", "kodef": "액체가 기체로 변하는 현상을 말해요.", "ch": 6}, {"en": "fire extinguishing", "ipa": "/faɪər ɪkˈstɪŋgwɪʃɪŋ/", "pos": "noun", "endef": "The act of putting out a fire.", "ko": "소화", "kodef": "불을 꺼서 없애는 것을 말해요.", "ch": 20}, {"en": "freeze", "ipa": "/friz/", "pos": "verb", "endef": "When a liquid changes into a solid.", "ko": "얼다", "kodef": "액체가 고체로 변하는 것을 말해요.", "ch": 5}, {"en": "freezing", "ipa": "/ˈfrizɪŋ/", "pos": "noun", "endef": "The process of a liquid changing into a solid.", "ko": "응고", "kodef": "액체가 얼어서 고체로 변하는 것을 말해요.", "ch": 5}, {"en": "gas", "ipa": "/gæs/", "pos": "noun", "endef": "Matter that fills up the entire space of a container.", "ko": "기체", "kodef": "담는 그릇의 공간을 가득 채우는 물질의 상태를 말해요.", "ch": 4}, {"en": "indicator", "ipa": "/ˈɪndəˌkeɪtər/", "pos": "noun", "endef": "A substance that tells us if a solution is acidic or basic.", "ko": "지시약", "kodef": "용액이 산성인지 염기성인지 알려주는 물질이에요.", "ch": 17}, {"en": "iron", "ipa": "/aɪərn/", "pos": "noun", "endef": "A strong and heavy metal. It is attracted to magnets.", "ko": "철", "kodef": "단단하고 무거운 금속이에요. 자석에 붙는 성질이 있어요.", "ch": 11}, {"en": "iron filings", "ipa": "/aɪərn ˈfaɪlɪŋz/", "pos": "noun", "endef": "Tiny pieces of iron that look like powder. They stick to magnets.", "ko": "철 가루", "kodef": "철을 아주 작고 가늘게 만든 가루예요. 자석을 가까이 대면 붙어요.", "ch": 11}, {"en": "liquid", "ipa": "/ˈlɪkwɪd/", "pos": "noun", "endef": "Matter that changes shape depending on the container.", "ko": "액체", "kodef": "담는 그릇에 따라 모양이 변하는 물질의 상태를 말해요.", "ch": 3}, {"en": "litmus paper", "ipa": "/ˈlɪtməs ˈpeɪpər/", "pos": "noun", "endef": "Paper that changes color in acidic and basic solutions.", "ko": "리트머스 종이", "kodef": "산성과 염기성에서 색이 변하는 종이예요.", "ch": 17}, {"en": "magnet", "ipa": "/ˈmægnət/", "pos": "noun", "endef": "An object that can pull things made of iron toward it.", "ko": "자석", "kodef": "철로 된 물질을 끌어당기는 힘이 있는 물체예요.", "ch": 11}, {"en": "material", "ipa": "/məˈtɪriəl/", "pos": "noun", "endef": "The substance that an object is made of.", "ko": "물질", "kodef": "물체를 만드는 재료를 말해요.", "ch": 1}, {"en": "matter", "ipa": "/ˈmætər/", "pos": "noun", "endef": "Everything around us is made of matter. Matter takes up space and has weight. Solids, liquids, and gases are all matter.", "ko": "물질", "kodef": "세상에 있는 모든 것을 이루는 재료예요. 공간을 차지하고, 무게가 있어요. 고체, 액체, 기체 모두 물질이에요.", "ch": 3}, {"en": "melt", "ipa": "/mɛlt/", "pos": "verb", "endef": "When a solid changes into a liquid.", "ko": "녹다", "kodef": "고체가 액체로 변하는 것을 말해요.", "ch": 5}, {"en": "melting", "ipa": "/ˈmɛltɪŋ/", "pos": "noun", "endef": "The process of a solid changing into a liquid.", "ko": "융해", "kodef": "고체가 녹아서 액체로 변하는 것을 말해요.", "ch": 5}, {"en": "mixture", "ipa": "/ˈmɪksʧər/", "pos": "noun", "endef": "Something made by putting two or more materials together. Salad, fruit juice, and soil are mixtures.", "ko": "혼합물", "kodef": "두 가지 이상의 물질이 섞여 있는 것을 말해요. 샐러드, 과일 주스, 흙 등이 혼합물이에요.", "ch": 9}, {"en": "neutralization", "ipa": "/ˌnutrələˈzeɪʃən/", "pos": "noun", "endef": "When an acid and a base meet and their properties become weaker.", "ko": "중화", "kodef": "산성과 염기성이 만나서 서로의 성질이 약해지는 것을 말해요.", "ch": 18}, {"en": "object", "ipa": "/ˈɑbʤɛkt/", "pos": "noun", "endef": "A thing that has a shape and takes up space.", "ko": "물체", "kodef": "모양을 가지고 있고 일정한 공간을 차지하는 구체적인 물건을 말해요.", "ch": 1}, {"en": "oxygen", "ipa": "/ˈɑksɪʤən/", "pos": "noun", "endef": "A gas that living things must have to breathe. It also has the property of helping things burn.", "ko": "산소", "kodef": "생물이 숨을 쉬는 데 꼭 필요한 기체예요. 물질이 타는 것을 도와주는 성질이 있어요.", "ch": 19}, {"en": "particle", "ipa": "/ˈpɑrtɪkəl/", "pos": "noun", "endef": "A small piece of something, like a grain of sand or a bean.", "ko": "알갱이", "kodef": "모래나 콩처럼 작은 낱개 하나하나를 말해요.", "ch": 10}, {"en": "phenolphthalein solution", "ipa": "/ˌfɛnɑlfˈθeɪlən səˈluʃən/", "pos": "noun", "endef": "An indicator that turns red only in basic solutions.", "ko": "페놀프탈레인 용액", "kodef": "염기성 용액에서만 붉은색으로 변하는 지시약이에요.", "ch": 17}, {"en": "pigment", "ipa": "/ˈpɪgmɛnt/", "pos": "noun", "endef": "A substance that gives color to things.", "ko": "색소", "kodef": "물질에 색깔을 나타나게 하는 성분이에요.", "ch": 17}, {"en": "property", "ipa": "/ˈprɑpərti/", "pos": "noun", "endef": "A special quality that something has.", "ko": "성질", "kodef": "물질이 가지고 있는 특징을 말해요.", "ch": 16}, {"en": "separate", "ipa": "/ˈsɛpərˌeɪt/", "pos": "verb", "endef": "To take apart things that are mixed together.", "ko": "분리하다", "kodef": "섞여 있는 것을 따로따로 나누는 것을 말해요.", "ch": 10}, {"en": "solid", "ipa": "/ˈsɑləd/", "pos": "noun", "endef": "Matter that keeps its shape and size.", "ko": "고체", "kodef": "모양과 부피가 변하지 않는 물질의 상태를 말해요.", "ch": 2}, {"en": "solubility", "ipa": "/ˌsɑljəˈbɪlɪti/", "pos": "noun", "endef": "The maximum amount of solute that can dissolve in a certain amount of liquid.", "ko": "용해도", "kodef": "일정한 양의 물에 녹을 수 있는 용질의 최대 양을 말해요.", "ch": 14}, {"en": "solute", "ipa": "/ˈsɑljut/", "pos": "noun", "endef": "A substance that dissolves in a liquid. In sugar water, sugar is the solute.", "ko": "용질", "kodef": "물에 녹는 물질을 말해요. 설탕물에서는 설탕이에요.", "ch": 12}, {"en": "solution", "ipa": "/səˈluʃən/", "pos": "noun", "endef": "What is made when a solute dissolves in a solvent.", "ko": "용액", "kodef": "용질이 용매에 녹아서 만들어진 것을 말해요.", "ch": 12}, {"en": "solvent", "ipa": "/ˈsɑlvənt/", "pos": "noun", "endef": "A liquid that dissolves other substances. In sugar water, water is the solvent.", "ko": "용매", "kodef": "다른 물질을 녹이는 물질을 말해요. 설탕물에서는 물이에요.", "ch": 12}, {"en": "substance", "ipa": "/ˈsəbstəns/", "pos": "noun", "endef": "What something is made of on the inside. Sugar, salt, and water are substances.", "ko": "물질", "kodef": "그것이 무엇으로 이루어져 있는지를 말할 때 사용해요. 설탕, 소금, 물 등이 물질이에요.", "ch": 12}, {"en": "temperature", "ipa": "/ˈtɛmpərəʧər/", "pos": "noun", "endef": "How hot or cold something is.", "ko": "온도", "kodef": "물체가 얼마나 뜨겁거나 차가운지를 나타내는 것이에요.", "ch": 14}, {"en": "vapor", "ipa": "/ˈveɪpər/", "pos": "noun", "endef": "Water that has changed into a gas. It is invisible.", "ko": "수증기", "kodef": "물이 기체로 변한 것을 말해요. 눈에 보이지 않아요.", "ch": 7}, {"en": "volume", "ipa": "/ˈvɑljum/", "pos": "noun", "endef": "The amount of space something takes up.", "ko": "부피", "kodef": "물질이 차지하는 공간의 크기를 말해요.", "ch": 3}, {"en": "water cycle", "ipa": "/ˈwɔtər ˈsaɪkəl/", "pos": "noun", "endef": "The way water moves from the earth to the sky and back again.", "ko": "물의 순환", "kodef": "물이 바다에서 하늘로, 하늘에서 다시 땅으로 돌고 도는 것을 말해요.", "ch": 8}, {"en": "water vapor", "ipa": "/ˈwɔtər ˈveɪpər/", "pos": "noun", "endef": "Water in the form of a gas. It is invisible.", "ko": "수증기", "kodef": "기체 상태의 물을 말해요. 눈에 보이지 않아요.", "ch": 6}, {"en": "weight", "ipa": "/weɪt/", "pos": "noun", "endef": "How heavy something is.", "ko": "무게", "kodef": "물체가 얼마나 무거운지를 나타내는 것이에요.", "ch": 13}]}, {"id": "physics", "en": "Physics", "ko": "물리", "count": 37, "entries": [{"en": "angle", "ipa": "/ˈæŋgəl/", "pos": "noun", "endef": "The space between two lines that meet.", "ko": "각도", "kodef": "두 선이 만나서 벌어진 정도를 말해요.", "ch": 7}, {"en": "balance", "ipa": "/ˈbæləns/", "pos": "noun", "endef": ": A flat state that does not tip to either side.", "ko": "수평", "kodef": ": 어느 한쪽으로도 기울지 않은 평평한 상태예요.", "ch": 3}, {"en": "circuit", "ipa": "/ˈsərkət/", "pos": "noun", "endef": "A path that lets electricity flow without stopping.", "ko": "회로", "kodef": "전기가 끊기지 않고 흐를 수 있도록 이어 놓은 길이에요.", "ch": 17}, {"en": "concave lens", "ipa": "/ˈkɑnkeɪv lɛnz/", "pos": "noun", "endef": "A lens that is thin in the middle and spreads light out in all directions.", "ko": "오목 렌즈", "kodef": "가운데가 얇고, 지나는 빛을 사방으로 퍼지게 하는 렌즈를 말해요.", "ch": 9}, {"en": "conversion", "ipa": "/kənˈvərʒən/", "pos": "noun", "endef": "The act of changing one thing into another.", "ko": "전환", "kodef": "어떤 것이 다른 것으로 바뀌는 것을 말해요.", "ch": 19}, {"en": "convex lens", "ipa": "/ˈkɑnˌvɛks lɛnz/", "pos": "noun", "endef": "A lens that is thick in the middle and brings light together at one point.", "ko": "볼록 렌즈", "kodef": "가운데가 두껍고, 지나는 빛을 한 점으로 모으는 렌즈를 말해요.", "ch": 9}, {"en": "distance", "ipa": "/ˈdɪstəns/", "pos": "noun", "endef": "How far it is from one place to another.", "ko": "거리", "kodef": "한 곳에서 다른 곳까지 떨어진 길이를 말해요.", "ch": 12}, {"en": "distance unit", "ipa": "/ˈdɪstəns ˈjunɪt/", "pos": "noun", "endef": "Something used to show how far, such as meters or kilometers.", "ko": "거리의 단위", "kodef": "얼마나 먼지를 나타낼 때 쓰는 m, km 같은 것을 말해요.", "ch": 14}, {"en": "electric circuit", "ipa": "/ɪˈlɛktrɪk ˈsərkət/", "pos": "noun", "endef": "A path that is joined with no breaks so electricity can flow all the way around.", "ko": "전기 회로", "kodef": "전기가 끊김 없이 한 바퀴 돌아 흐를 수 있도록 이어진 길이에요.", "ch": 16}, {"en": "electricity", "ipa": "/ɪˌlɛkˈtrɪsəti/", "pos": "noun", "endef": "The power that lights bulbs and makes machines work.", "ko": "전기", "kodef": "전구에 불을 켜거나 기계를 움직이게 하는 힘이에요.", "ch": 17}, {"en": "electromagnet", "ipa": "/ˌɪˌlɛktroʊˈmægnət/", "pos": "noun", "endef": "An object that becomes a magnet only while electricity flows through it.", "ko": "전자석", "kodef": "전기가 흐를 때만 자석이 되는 물건이에요.", "ch": 18}, {"en": "filament", "ipa": "/ˈfɪləmənt/", "pos": "noun", "endef": "A very thin wire inside a light bulb that becomes hot and gives off light when electricity passes through it.", "ko": "필라멘트", "kodef": "전구 안에 들어 있는 아주 가느다란 줄로, 전기가 지날 때 뜨거워지면서 빛을 내는 부분이에요.", "ch": 16}, {"en": "focal point", "ipa": "/ˈfoʊkəl pɔɪnt/", "pos": "noun", "endef": "The point where light comes together after passing through a convex lens.", "ko": "초점", "kodef": "볼록 렌즈를 지난 빛이 한곳에 모이는 점을 말해요.", "ch": 9}, {"en": "force", "ipa": "/fɔrs/", "pos": "noun", "endef": ": A push or pull on an object.", "ko": "힘", "kodef": ": 물체를 밀거나 당기는 작용이에요.", "ch": 1}, {"en": "gravity", "ipa": "/ˈgrævɪti/", "pos": "noun", "endef": ": The force that pulls objects toward Earth.", "ko": "중력", "kodef": ": 지구가 물체를 끌어당기는 힘이에요.", "ch": 1}, {"en": "lever", "ipa": "/ˈlɛvər/", "pos": "noun", "endef": "A tool that uses a support point to move heavy objects with less force.", "ko": "지레", "kodef": "받침점을 이용해 작은 힘으로 무거운 물체를 움직이게 해 주는 도구예요.", "ch": 4}, {"en": "light bulb", "ipa": "/laɪt bəlb/", "pos": "noun", "endef": "An object that gives off light when a thin wire inside it becomes hot from electricity.", "ko": "전구", "kodef": "전기가 흐를 때 안에 든 가느다란 줄이 뜨거워지면서 빛을 내는 물건이에요.", "ch": 16}, {"en": "microscope", "ipa": "/ˈmaɪkrəˌskoʊp/", "pos": "noun", "endef": "A tool that uses lenses to make very tiny things look bigger.", "ko": "현미경", "kodef": "렌즈를 이용해 아주 작은 것을 크게 보여 주는 도구를 말해요.", "ch": 10}, {"en": "motion", "ipa": "/ˈmoʊʃən/", "pos": "noun", "endef": "A change in an object's position as time passes.", "ko": "운동", "kodef": "시간이 지남에 따라 물체의 위치가 변하는 것을 말해요.", "ch": 11}, {"en": "parallel", "ipa": "/ˈpɛrəˌlɛl/", "pos": "noun", "endef": "A way of joining things side by side so they make several separate paths.", "ko": "병렬", "kodef": "여러 개를 따로따로 나란히 이어, 길이 여러 갈래로 나뉘게 한 방식이에요.", "ch": 17}, {"en": "path", "ipa": "/pæθ/", "pos": "noun", "endef": "The way that something moves along to get somewhere.", "ko": "길", "kodef": "어떤 곳으로 가기 위해 지나는 곳을 말해요.", "ch": 12}, {"en": "reflection", "ipa": "/rɪˈflɛkʃən/", "pos": "noun", "endef": "When light hits a smooth surface and comes back in a new direction.", "ko": "반사", "kodef": "빛이 매끄러운 면에 부딪혀 방향을 바꾸어 되돌아오는 것을 말해요.", "ch": 7}, {"en": "refract", "ipa": "/rɪˈfrækt/", "pos": "verb", "endef": "When light bends as it goes from one material into another.", "ko": "굴절하다", "kodef": "빛이 한 물질에서 다른 물질로 들어갈 때 방향이 꺾이는 것을 말해요.", "ch": 9}, {"en": "refraction", "ipa": "/rɪˈfrækʃən/", "pos": "noun", "endef": "The bending of light when it goes from one material into another at a slant.", "ko": "굴절", "kodef": "빛이 한 물질에서 다른 물질로 비스듬히 들어갈 때 방향이 꺾이는 현상을 말해요.", "ch": 8}, {"en": "scale", "ipa": "/skeɪl/", "pos": "noun", "endef": ": A tool used to find out how heavy something is.", "ko": "저울", "kodef": ": 물체가 얼마나 무거운지 재는 도구예요.", "ch": 2}, {"en": "seesaw", "ipa": "/ˈsiˌsɔ/", "pos": "noun", "endef": ": A long board at a playground that moves up and down.", "ko": "시소", "kodef": ": 놀이터에서 위아래로 움직이는 긴 널빤지예요.", "ch": 3}, {"en": "series", "ipa": "/ˈsɪriz/", "pos": "noun", "endef": "A way of joining things one after another in a single line so they form just one path from start to end.", "ko": "직렬", "kodef": "여러 개를 한 줄로 죽 이어, 처음부터 끝까지 길이 하나만 생기게 한 방식이에요.", "ch": 17}, {"en": "shadow", "ipa": "/ˈʃæˌdoʊ/", "pos": "noun", "endef": "A dark area that forms when an object blocks light.", "ko": "그림자", "kodef": "빛이 물체에 막혀 물체 뒤쪽에 생기는 어두운 부분이에요.", "ch": 6}, {"en": "speed", "ipa": "/spid/", "pos": "noun", "endef": "The distance something moves in a set time.", "ko": "속력", "kodef": "정해진 시간 동안 물체가 이동한 거리를 말해요.", "ch": 13}, {"en": "speedometer", "ipa": "/spiˈdɑmətər/", "pos": "noun", "endef": "A tool in a car that shows how fast it is going.", "ko": "속도계", "kodef": "자동차가 얼마나 빠르게 달리는지 보여 주는 장치를 말해요.", "ch": 14}, {"en": "spring", "ipa": "/spərɪŋ/", "pos": "noun", "endef": ": An object that gets longer when you pull it and goes back when you let go.", "ko": "용수철", "kodef": ": 잡아당기면 길어졌다가 놓으면 다시 돌아오는 물건이에요.", "ch": 2}, {"en": "stopping distance", "ipa": "/ˈstɑpɪŋ ˈdɪstəns/", "pos": "noun", "endef": "How far a moving thing keeps going until it no longer moves.", "ko": "정지 거리", "kodef": "움직이던 것이 더 이상 움직이지 않을 때까지 앞으로 얼마나 더 나아가는지를 말해요.", "ch": 15}, {"en": "strength", "ipa": "/strɛŋθ/", "pos": "noun", "endef": ": The size or power of a force.", "ko": "세기", "kodef": ": 힘이나 작용의 크기예요.", "ch": 1}, {"en": "support point", "ipa": "/səˈpɔrt pɔɪnt/", "pos": "noun", "endef": ": The point in the middle that holds a seesaw up.", "ko": "받침점", "kodef": ": 시소를 가운데에서 받쳐 주는 점이에요.", "ch": 3}, {"en": "telescope", "ipa": "/ˈtɛləˌskoʊp/", "pos": "noun", "endef": "A tool that uses lenses to make faraway things look bigger.", "ko": "망원경", "kodef": "렌즈를 이용해 멀리 있는 것을 크게 보여 주는 도구를 말해요.", "ch": 10}, {"en": "time unit", "ipa": "/taɪm ˈjunɪt/", "pos": "noun", "endef": "Something used to show how long, such as seconds or minutes.", "ko": "시간의 단위", "kodef": "얼마나 오래 걸리는지를 나타낼 때 쓰는 초, 분 같은 것을 말해요.", "ch": 14}, {"en": "unit", "ipa": "/ˈjunɪt/", "pos": "noun", "endef": "A fixed amount used as a standard for measuring things.", "ko": "단위", "kodef": "무게나 길이처럼 어떤 양을 나타낼 때 사용하는 약속된 기준이에요.", "ch": 5}]}, {"id": "biology", "en": "Biology", "ko": "생물", "count": 57, "entries": [{"en": "antibiotic", "ipa": "/ˌæntibaɪˈɑtɪk/", "pos": "noun", "endef": "A medicine that kills bacteria or stops them from growing. Antibiotics were first discovered from blue mold.", "ko": "항생제", "kodef": "세균을 죽이거나 세균이 자라지 못하도록 막는 약이에요. 푸른곰팡이에서 처음 발견되었어요.", "ch": 16}, {"en": "backbone", "ipa": "/ˈbækˌboʊn/", "pos": "noun", "endef": "A row of bones that runs down the middle of an animal's back. It supports and protects the body.", "ko": "등뼈", "kodef": "동물의 등 가운데를 따라 이어진 뼈예요. 몸을 지탱하고 보호하는 역할을 해요.", "ch": 2}, {"en": "bacteria", "ipa": "/bækˈtɪriə/", "pos": "noun", "endef": "Living things that are much smaller and simpler in structure than fungi or protists.", "ko": "세균", "kodef": "균류나 원생생물보다 훨씬 작고 구조가 단순한 생물이에요.", "ch": 15}, {"en": "blue mold", "ipa": "/blu moʊld/", "pos": "noun", "endef": "A type of fungus that is blue in color. It is known to produce a substance that kills bacteria. Note: Scientists call this group of molds Penicillium.", "ko": "푸른곰팡이", "kodef": "푸른색을 띠는 곰팡이예요. 세균을 죽이는 성분을 만들어내는 것으로 알려져 있어요. 참고: 과학자들은 이 곰팡이 무리를 페니실리움(Penicillium)이라고 불러요.", "ch": 16}, {"en": "caterpillar", "ipa": "/ˈkætəˌpɪlər/", "pos": "noun", "endef": "The larva of a butterfly or moth. It hatches from an egg and grows by eating leaves.", "ko": "나비 애벌레", "kodef": "나비나 나방의 애벌레예요. 알에서 깨어나 잎을 먹으며 자라요.", "ch": 1}, {"en": "classification", "ipa": "/ˌklæsəfəˈkeɪʃən/", "pos": "noun", "endef": "The process of sorting animals or objects into groups based on shared features.", "ko": "분류", "kodef": "동물이나 물건을 공통된 특징에 따라 무리로 나누는 것이에요.", "ch": 2}, {"en": "coat change", "ipa": "/koʊt ʧeɪnʤ/", "pos": "noun", "endef": "The process in which an animal's fur falls out and new fur grows in with the changing seasons.", "ko": "털갈이", "kodef": "동물이 계절에 따라 털이 빠지고 새로운 털이 자라나는 과정이에요.", "ch": 4}, {"en": "complete", "ipa": "/kəmˈplit/", "pos": "adjective", "endef": "Going through all the stages without skipping any.", "ko": "완전", "kodef": "빠진 단계 없이 모든 과정을 다 거치는 것을 말해요.", "ch": 1}, {"en": "consumer", "ipa": "/kənˈsumər/", "pos": "noun", "endef": "A living thing that cannot make its own food and gets nutrients by eating other organisms.", "ko": "소비자", "kodef": "스스로 양분을 만들지 못하고 다른 생물을 먹어서 양분을 얻는 생물이에요.", "ch": 18}, {"en": "decomposer", "ipa": "/ˌdikəmˈpoʊzər/", "pos": "noun", "endef": "A living thing that gets nutrients by breaking down dead organisms and waste.", "ko": "분해자", "kodef": "죽은 생물이나 배설물을 분해해서 양분을 얻는 생물이에요.", "ch": 18}, {"en": "dispersal", "ipa": "/dɪˈspərsəl/", "pos": "noun", "endef": "The process by which seeds travel far from the parent plant with the help of wind, animals, or water.", "ko": "씨앗의 이동", "kodef": "씨앗이 바람, 동물, 물 등의 도움을 받아 멀리 퍼져나가는 것이에요.", "ch": 12}, {"en": "ecological balance", "ipa": "/ɛkəˈlɑʤɪkəl ˈbæləns/", "pos": "noun", "endef": "A condition in which the types and numbers of living things in an ecosystem are kept stable.", "ko": "생태계의 평형", "kodef": "생태계 속 생물의 종류와 수가 안정적으로 유지되는 상태예요.", "ch": 20}, {"en": "ecosystem", "ipa": "/ˈikoʊˌsɪstəm/", "pos": "noun", "endef": "A place where living things and their surrounding environment affect each other.", "ko": "생태계", "kodef": "어떤 장소에서 살고 있는 생물과 그 주변 환경이 서로 영향을 주고받는 것이에요.", "ch": 17}, {"en": "environment", "ipa": "/ɪnˈvaɪrənmənt/", "pos": "noun", "endef": "The conditions around a living thing, such as sunlight, water, air, and soil.", "ko": "환경", "kodef": "생물이 살아가는 주변의 조건이에요. 햇빛, 물, 공기, 흙 등이 환경을 이루어요.", "ch": 17}, {"en": "ferment", "ipa": "/ˈfərmɛnt/", "pos": "verb", "endef": "A process in which living things such as bacteria change food into something new.", "ko": "발효", "kodef": "세균이나 균류 같은 생물이 음식을 변화시켜 새로운 음식을 만드는 과정이에요.", "ch": 15}, {"en": "fermented food", "ipa": "/fərˈmɛntəd fud/", "pos": "noun", "endef": "A food that is made when living things such as bacteria or fungi change the food. Kimchi, yogurt, and doenjang are all fermented foods.", "ko": "발효 음식", "kodef": "세균이나 균류 같은 생물이 음식을 변화시켜 만들어진 음식이에요. 김치, 요구르트, 된장이 발효 음식이에요.", "ch": 16}, {"en": "fin", "ipa": "/fɪn/", "pos": "noun", "endef": "A thin, flat part on the body of a fish or other water animal that is used for swimming.", "ko": "지느러미", "kodef": "물고기나 물속 동물이 물속에서 헤엄칠 때 사용하는 기관이에요.", "ch": 3}, {"en": "food chain", "ipa": "/fud ʧeɪn/", "pos": "noun", "endef": "A series of living things connected by the relationship of eating and being eaten.", "ko": "먹이사슬", "kodef": "생태계 속 생물들이 먹고 먹히는 관계가 사슬처럼 연결된 것이에요.", "ch": 19}, {"en": "food web", "ipa": "/fud wɛb/", "pos": "noun", "endef": "A system of many food chains that are connected together in a complex way.", "ko": "먹이그물", "kodef": "여러 먹이사슬이 그물처럼 복잡하게 연결된 것이에요.", "ch": 19}, {"en": "fungi", "ipa": "/ˈfənʤaɪ/", "pos": "noun", "endef": "The group of living things that includes molds and mushrooms. They cannot carry out photosynthesis, and they get nutrients by breaking down other living things.", "ko": "균류", "kodef": "곰팡이와 버섯이 속하는 생물 무리예요. 광합성을 하지 못하고 다른 생물을 분해해서 양분을 얻어요.", "ch": 13}, {"en": "gill", "ipa": "/gɪl/", "pos": "noun", "endef": "The organ that animals living in water use to breathe underwater.", "ko": "아가미", "kodef": "물속에 사는 동물이 물속에서 숨을 쉬는 데 사용하는 기관이에요.", "ch": 3}, {"en": "habitat", "ipa": "/ˈhæbəˌtæt/", "pos": "noun", "endef": "The place where an animal lives, finds food, and grows.", "ko": "서식지", "kodef": "동물이 먹이를 먹고 살아가는 곳이에요.", "ch": 3}, {"en": "hibernation", "ipa": "/ˌhaɪbərˈneɪʃən/", "pos": "noun", "endef": "A long, deep sleep that some animals take during the cold winter months to survive.", "ko": "겨울잠", "kodef": "동물이 추운 겨울을 나기 위해 오랫동안 잠을 자는 것이에요.", "ch": 4}, {"en": "incomplete", "ipa": "/ˌɪnkəmˈplit/", "pos": "adjective", "endef": "Missing one or more stages. Incomplete metamorphosis has no pupa stage.", "ko": "불완전", "kodef": "일부 단계가 빠진 것을 말해요. 불완전 탈바꿈은 번데기 단계가 없어요.", "ch": 1}, {"en": "invertebrate", "ipa": "/ˌɪnˈvərtəˌbreɪt/", "pos": "noun", "endef": "An animal that does not have a backbone inside its body. Insects, octopuses, and snails are all invertebrates.", "ko": "무척추동물", "kodef": "몸속에 등뼈가 없는 동물이에요. 곤충, 문어, 달팽이 등이 무척추동물이에요.", "ch": 2}, {"en": "lactic acid bacteria", "ipa": "/ˈlæktɪk ˈæsəd bækˈtɪriə/", "pos": "noun", "endef": "A type of bacteria that produces lactic acid through fermentation. They are used to make foods such as yogurt and kimchi.", "ko": "유산균", "kodef": "발효를 통해 젖산을 만들어 내는 세균이에요. 요구르트나 김치를 만드는 데 도움을 주어요.", "ch": 15}, {"en": "larva", "ipa": "/ˈlɑrvə/", "pos": "noun", "endef": "The stage of an insect right after it hatches from an egg, before it becomes an adult.", "ko": "애벌레", "kodef": "곤충이 알에서 깨어난 직후의 모습으로, 어른벌레가 되기 전 단계예요.", "ch": 1}, {"en": "leaf", "ipa": "/lif/", "pos": "noun", "endef": "The flat, green part attached to a plant's stem.", "ko": "잎", "kodef": "식물의 줄기에 달려 있는 납작한 부분이에요.", "ch": 5}, {"en": "metamorphosis", "ipa": "/ˌmɛtəˈmɔrfəsəs/", "pos": "noun", "endef": "The process in which an animal's body changes greatly as it grows.", "ko": "탈바꿈", "kodef": "동물이 자라면서 몸의 모양이 크게 바뀌는 과정이에요.", "ch": 1}, {"en": "microscope", "ipa": "/ˈmaɪkrəˌskoʊp/", "pos": "noun", "endef": "A tool that makes very tiny things look much bigger so they can be seen clearly.", "ko": "현미경", "kodef": "눈으로 볼 수 없을 만큼 아주 작은 것을 크게 확대해서 볼 수 있는 도구예요.", "ch": 15}, {"en": "migration", "ipa": "/maɪˈgreɪʃən/", "pos": "noun", "endef": "The movement of animals from one place to another to find food or warmer weather.", "ko": "이동", "kodef": "동물이 먹이나 따뜻한 날씨를 찾아 다른 곳으로 이동하는 것이에요.", "ch": 4}, {"en": "migratory bird", "ipa": "/ˈmaɪgrəˌtɔri bərd/", "pos": "noun", "endef": "A bird that travels to warmer places when the seasons change.", "ko": "철새", "kodef": "계절에 따라 따뜻한 곳으로 이동하는 새예요.", "ch": 4}, {"en": "mold", "ipa": "/moʊld/", "pos": "noun", "endef": "A type of fungus that breaks down dead living things or food to get nutrients.", "ko": "곰팡이", "kodef": "균류의 한 종류로, 죽은 생물이나 음식물을 분해해서 양분을 얻어 살아가요.", "ch": 13}, {"en": "nutrient", "ipa": "/ˈnutriənt/", "pos": "noun", "endef": "A substance that living things need to grow and stay healthy.", "ko": "양분", "kodef": "생물이 자라고 건강하게 살아가는 데 필요한 물질이에요.", "ch": 8}, {"en": "organ", "ipa": "/ˈɔrgən/", "pos": "noun", "endef": "A part of a plant or animal's body that has a special job to do.", "ko": "기관", "kodef": "식물이나 동물의 몸에서 특별한 역할을 담당하는 부분이에요.", "ch": 10}, {"en": "organism", "ipa": "/ˈɔrgəˌnɪzəm/", "pos": "noun", "endef": "Another word for a living thing. Plants, animals, fungi, and bacteria are all organisms.", "ko": "생물", "kodef": "생물을 부르는 또 다른 말이에요. 식물, 동물, 균류, 세균이 모두 생물(organism)이에요.", "ch": 18}, {"en": "paramecium", "ipa": "/ˌpɛrəˈmisiəm/", "pos": "noun", "endef": "A protist that lives in water and is shaped like the sole of a shoe. It swims by moving the tiny hairs on the surface of its body. Note: This word is usually learned in middle school in English-speaking countries.", "ko": "짚신벌레", "kodef": "물속에 사는 원생생물로, 짚신 모양으로 생겼고 몸 표면의 가는 털을 움직여 헤엄쳐요.", "ch": 14}, {"en": "photosynthesis", "ipa": "/ˌfoʊtoʊˈsɪnθəsɪs/", "pos": "noun", "endef": "The process by which plants use light, water, and carbon dioxide to make their own food in their leaves.", "ko": "광합성", "kodef": "식물이 빛, 물, 이산화탄소를 이용해 잎에서 스스로 양분을 만드는 과정이에요.", "ch": 10}, {"en": "pistil", "ipa": "/ˈpɪstəl/", "pos": "noun", "endef": "The part of a flower that receives pollen.", "ko": "암술", "kodef": "꽃가루를 받아들이는 꽃의 기관이에요.", "ch": 11}, {"en": "pollen", "ipa": "/ˈpɑlən/", "pos": "noun", "endef": "A very fine and light powder made inside a flower.", "ko": "꽃가루", "kodef": "꽃 안에서 만들어지는 아주 작고 가벼운 가루예요.", "ch": 11}, {"en": "pollination", "ipa": "/ˌpɑləˈneɪʃən/", "pos": "noun", "endef": "The process in which pollen moves from a stamen to a pistil.", "ko": "수분", "kodef": "꽃가루가 수술에서 암술로 이동하는 과정이에요. '꽃가루받이'라고도 해요.", "ch": 11}, {"en": "pollution", "ipa": "/pəˈluʃən/", "pos": "noun", "endef": "The process by which the natural environment becomes dirty or damaged by human activity.", "ko": "환경 오염", "kodef": "사람의 활동으로 자연환경이 더럽혀지거나 파괴되는 것이에요.", "ch": 20}, {"en": "producer", "ipa": "/prəˈdusər/", "pos": "noun", "endef": "A living thing that makes its own food using sunlight, water, and air.", "ko": "생산자", "kodef": "햇빛, 물, 공기를 이용해 스스로 양분을 만드는 생물이에요.", "ch": 18}, {"en": "protist", "ipa": "/ˈproʊtɪst/", "pos": "noun", "endef": "A living thing that is not an animal, a plant, or a fungus.", "ko": "원생생물", "kodef": "동물도 식물도 균류도 아닌 별도의 생물 무리예요.", "ch": 14}, {"en": "pupa", "ipa": "/ˈpjupə/", "pos": "noun", "endef": "The stage between a larva and an adult insect. During this stage, the whole body completely changes.", "ko": "번데기", "kodef": "애벌레에서 어른벌레로 바뀌는 중간 단계예요. 이 시기에 몸 전체가 완전히 바뀌어요.", "ch": 1}, {"en": "root", "ipa": "/rut/", "pos": "noun", "endef": "The underground part of a plant. It absorbs water and nutrients and holds the plant firmly in the ground.", "ko": "뿌리", "kodef": "식물의 땅속 부분이에요. 물과 양분을 흡수하고 식물을 땅에 단단히 붙잡아 줘요.", "ch": 8}, {"en": "seed", "ipa": "/sid/", "pos": "noun", "endef": "The starting point of a plant's life cycle. When planted in the ground, it sprouts and grows into a new plant.", "ko": "씨앗", "kodef": "식물의 한살이가 시작되는 곳이에요. 땅에 심으면 싹이 터서 새로운 식물로 자라나요.", "ch": 5}, {"en": "sepal", "ipa": "/ˈsɛpəl/", "pos": "noun", "endef": "The leaf-like part that sits below the petals of a flower. It supports and protects the flower.", "ko": "꽃받침", "kodef": "꽃잎 아래에 있는 잎 모양의 부분이에요. 꽃을 받쳐주고 보호하는 역할을 해요.", "ch": 11}, {"en": "spirogyra", "ipa": "/ˌspaɪroʊˈdʒaɪrə/", "pos": "noun", "endef": "A green, thread-shaped protist that lives in water and makes its own food using sunlight. Note: This word is usually learned in middle school in English-speaking countries.", "ko": "해캄", "kodef": "물속에 사는 초록색 실 모양의 원생생물로, 햇빛을 이용해 스스로 양분을 만들 수 있어요. 참고: 영어권 나라에서는 중학교 수준에서 배우는 단어예요.", "ch": 14}, {"en": "spore", "ipa": "/spɔr/", "pos": "noun", "endef": "A tiny particle that fungi spread to reproduce.", "ko": "포자", "kodef": "곰팡이나 버섯이 번식하기 위해 퍼뜨리는 아주 작은 입자예요.", "ch": 13}, {"en": "sprout", "ipa": "/spraʊt/", "pos": "noun", "endef": "The young plant that first pushes up through the soil after a seed is planted.", "ko": "싹", "kodef": "씨앗이 땅속에서 처음 땅 위로 나오는 어린 식물이에요.", "ch": 5}, {"en": "stamen", "ipa": "/ˈsteɪmən/", "pos": "noun", "endef": "The part of a flower that produces pollen.", "ko": "수술", "kodef": "꽃가루를 만드는 꽃의 기관이에요.", "ch": 11}, {"en": "stem", "ipa": "/stɛm/", "pos": "noun", "endef": "The main body of a plant that connects the roots to the leaves and flowers, carrying water and nutrients throughout the plant.", "ko": "줄기", "kodef": "식물의 몸통 부분으로, 뿌리에서 흡수한 물과 양분을 잎과 꽃으로 전달해줘요.", "ch": 5}, {"en": "streamlined", "ipa": "/ˈstrimˌlaɪnd/", "pos": "adjective", "endef": "Having a smooth, narrow shape that moves easily through water or air with little resistance.", "ko": "유선형", "kodef": "물이나 공기의 저항을 적게 받도록 앞이 좁고 뒤로 갈수록 넓어지는 매끄러운 모양이에요.", "ch": 3}, {"en": "tadpole", "ipa": "/ˈtædˌpoʊl/", "pos": "noun", "endef": "The young form of a frog right after it hatches from an egg. It breathes through gills and lives in water.", "ko": "올챙이", "kodef": "개구리가 알에서 깨어난 직후의 모습이에요. 아가미로 숨을 쉬며 물속에서 살아요.", "ch": 3}, {"en": "vertebrate", "ipa": "/ˈvərtəˌbreɪt/", "pos": "noun", "endef": "An animal that has a backbone inside its body. Fish, frogs, birds, and dogs are all vertebrates.", "ko": "척추동물", "kodef": "몸속에 등뼈가 있는 동물이에요. 물고기, 개구리, 새, 개 등이 척추동물이에요.", "ch": 2}, {"en": "webbed feet", "ipa": "/wɛbd fit/", "pos": "noun", "endef": "Feet that have thin skin connecting the toes, found on animals such as ducks and frogs. They help the animal swim in water.", "ko": "물갈퀴", "kodef": "오리나 개구리처럼 물에 사는 동물의 발가락 사이에 있는 얇은 막이에요. 헤엄칠 때 도움을 줘요.", "ch": 3}]}, {"id": "body", "en": "Human Body", "ko": "인체", "count": 56, "entries": [{"en": "air tube (bronchi)", "ipa": "/ɛr tub/", "pos": "noun", "endef": "The two branches where the windpipe splits, sending air to the left lung and the right lung.", "ko": "기관지", "kodef": "기관이 두 갈래로 나뉜 부분으로, 왼쪽 폐와 오른쪽 폐로 공기를 보내 줘요.", "ch": 11}, {"en": "anus", "ipa": "/ˈeɪnəs/", "pos": "noun", "endef": "The opening where solid waste leaves the body.", "ko": "항문", "kodef": "대변이 몸 밖으로 나가는 곳이에요.", "ch": 14}, {"en": "belly muscle", "ipa": "/ˈbɛli ˈməsəl/", "pos": "noun", "endef": "The muscle in the belly that holds the center of the body steady and helps the body bend forward.", "ko": "배 근육", "kodef": "배에 있으면서 몸의 중심을 잡아 주고 몸을 숙일 수 있게 해 주는 근육을 말해요.", "ch": 2}, {"en": "bile", "ipa": "/baɪl/", "pos": "noun", "endef": "A juice made by the liver that breaks down greasy food into small pieces.", "ko": "쓸개즙", "kodef": "간이 만든 물질로, 기름진 음식을 잘게 쪼개 주는 역할을 해요.", "ch": 9}, {"en": "bladder", "ipa": "/ˈblædər/", "pos": "noun", "endef": "A stretchy bag where urine collects.", "ko": "방광", "kodef": "오줌이 모이는 주머니예요.", "ch": 14}, {"en": "blood vessel", "ipa": "/bləd ˈvɛsəl/", "pos": "noun", "endef": "A tube that carries blood throughout the body.", "ko": "혈관", "kodef": "혈액이 온몸을 돌아다니는 길이에요.", "ch": 10}, {"en": "breathing organ", "ipa": "/ˈbriðɪŋ ˈɔrgən/", "pos": "noun", "endef": "A part of the body used for breathing.", "ko": "호흡 기관", "kodef": "숨을 쉬는 데 사용되는 몸속 기관을 말해요.", "ch": 11}, {"en": "calf muscle", "ipa": "/kæf ˈməsəl/", "pos": "noun", "endef": "The muscle in the lower leg that works together with the thigh muscle for walking and running.", "ko": "종아리 근육", "kodef": "종아리에 있으면서 걷거나 뛸 때 함께 힘을 내 주는 근육을 말해요.", "ch": 2}, {"en": "carbon dioxide", "ipa": "/ˈkɑrbən daɪˈɑkˌsaɪd/", "pos": "noun", "endef": "A waste gas made in the body after oxygen is used.", "ko": "이산화탄소", "kodef": "몸속에서 산소가 사용된 후 생기는 찌꺼기 기체예요.", "ch": 12}, {"en": "digestion", "ipa": "/daɪˈʤɛsʧən/", "pos": "noun", "endef": "The process of breaking food into tiny pieces so the body can absorb it.", "ko": "소화", "kodef": "음식을 아주 잘게 쪼개서 몸이 흡수할 수 있게 만드는 과정이에요.", "ch": 6}, {"en": "digestive juice", "ipa": "/daɪˈʤɛstɪv ʤus/", "pos": "noun", "endef": "The liquid in the stomach that breaks food down into smaller pieces.", "ko": "소화액", "kodef": "위에서 나오는 물로, 음식을 잘게 녹여 줘요.", "ch": 7}, {"en": "digestive organs", "ipa": "/daɪˈʤɛstɪv ˈɔrgənz/", "pos": "noun", "endef": "The organs that break down food and absorb nutrients. They include the mouth, food pipe, stomach, small intestine, and large intestine.", "ko": "소화 기관", "kodef": "음식물을 잘게 부수고 영양분을 흡수하는 기관이에요. 입, 식도, 위, 작은창자, 큰창자 등이 있어요.", "ch": 14}, {"en": "excretion", "ipa": "/ɪkˈskriʃən/", "pos": "noun", "endef": "The process of sending waste out of the body.", "ko": "배설", "kodef": "노폐물을 몸 밖으로 내보내는 것을 말해요.", "ch": 14}, {"en": "excretory organ", "ipa": "/ˈɛkskrəˌtɔri ˈɔrgən/", "pos": "noun", "endef": "An organ that is in charge of removing waste from the body.", "ko": "배설 기관", "kodef": "배설을 담당하는 몸속 기관을 말해요.", "ch": 14}, {"en": "food pipe (esophagus)", "ipa": "/fud paɪp/", "pos": "noun", "endef": "A long tube that pushes chewed food down from the mouth to the stomach.", "ko": "식도", "kodef": "입에서 씹힌 음식을 위로 밀어 내리는 긴 관이에요.", "ch": 7}, {"en": "gallbladder", "ipa": "/ˈgɔlˌblædər/", "pos": "noun", "endef": "A small bag that stores bile and sends it out when it is needed.", "ko": "쓸개", "kodef": "간이 만든 쓸개즙을 모아 두었다가 필요할 때 내보내는 주머니예요.", "ch": 9}, {"en": "gas exchange", "ipa": "/gæs ɪksˈʧeɪnʤ/", "pos": "noun", "endef": "The process in the lungs of taking in oxygen and sending out carbon dioxide.", "ko": "가스 교환", "kodef": "폐에서 산소를 받아들이고 이산화탄소를 내보내는 것을 말해요.", "ch": 12}, {"en": "heart", "ipa": "/hɑrt/", "pos": "noun", "endef": "An organ that pumps blood to the whole body.", "ko": "심장", "kodef": "혈액을 온몸으로 보내 주는 펌프 역할을 하는 기관이에요.", "ch": 10}, {"en": "heartbeat", "ipa": "/ˈhɑrtˌbit/", "pos": "noun", "endef": "The beating of the heart.", "ko": "심장 박동", "kodef": "심장이 뛰는 것을 말해요.", "ch": 20}, {"en": "intestine", "ipa": "/ˌɪnˈtɛˌstaɪn/", "pos": "noun", "endef": "A long tube below the stomach that includes the small intestine and the large intestine.", "ko": "창자", "kodef": "위 아래에 있는 긴 관으로, 작은창자와 큰창자가 있어요.", "ch": 6}, {"en": "joint", "ipa": "/ʤɔɪnt/", "pos": "noun", "endef": "The place where two bones meet.", "ko": "관절", "kodef": "뼈와 뼈가 만나는 곳이에요.", "ch": 4}, {"en": "kidney", "ipa": "/ˈkɪdni/", "pos": "noun", "endef": "An organ that filters waste from the blood.", "ko": "콩팥(신장)", "kodef": "혈액 속 노폐물을 걸러내는 기관이에요.", "ch": 13}, {"en": "large intestine", "ipa": "/lɑrʤ ˌɪnˈtɛˌstaɪn/", "pos": "noun", "endef": "A thick tube after the small intestine that collects waste and gets it ready to leave the body.", "ko": "큰창자", "kodef": "작은창자 다음에 있는 굵은 관으로, 찌꺼기를 모아서 몸 밖으로 내보낼 준비를 하는 곳이에요.", "ch": 8}, {"en": "liver", "ipa": "/ˈlɪvər/", "pos": "noun", "endef": "The largest internal organ in the body that makes bile.", "ko": "간", "kodef": "몸속에서 가장 큰 장기로, 쓸개즙을 만드는 곳이에요.", "ch": 9}, {"en": "lung", "ipa": "/ləŋ/", "pos": "noun", "endef": "The breathing organ where gas exchange takes place.", "ko": "폐", "kodef": "가스 교환이 일어나는 호흡 기관이에요.", "ch": 12}, {"en": "muscle", "ipa": "/ˈməsəl/", "pos": "noun", "endef": "A part of the body that is attached to bones and moves the body by getting shorter and longer.", "ko": "근육", "kodef": "뼈에 붙어 있으면서 줄어들었다 늘어났다 하며 몸을 움직여 주는 부분을 말해요.", "ch": 2}, {"en": "nerve", "ipa": "/nərv/", "pos": "noun", "endef": "A thin thread in the body that carries information to the brain.", "ko": "신경", "kodef": "몸 곳곳의 정보를 뇌로 전달해 주는 가는 줄이에요.", "ch": 16}, {"en": "nervous system", "ipa": "/ˈnərvəs ˈsɪstəm/", "pos": "noun", "endef": "The brain and all the nerves spread throughout the body, working together.", "ko": "신경계", "kodef": "뇌와 온몸에 퍼져 있는 신경을 모두 합쳐서 부르는 말이에요.", "ch": 19}, {"en": "nutrient", "ipa": "/ˈnutriənt/", "pos": "noun", "endef": "A good substance found in food that our body needs to stay healthy.", "ko": "영양분", "kodef": "음식 속에 들어 있는, 우리 몸에 필요한 좋은 성분이에요.", "ch": 6}, {"en": "organ", "ipa": "/ˈɔrgən/", "pos": "noun", "endef": "A part of the body that has its own special job to do.", "ko": "기관", "kodef": "몸속에서 각각 맡은 일을 하는 부분이에요.", "ch": 13}, {"en": "organ", "ipa": "/ˈɔrgən/", "pos": "noun", "endef": "A part inside the body that does a special job.", "ko": "장기", "kodef": "우리 몸속에서 저마다 특별한 일을 맡아 하는 부분이에요.", "ch": 3}, {"en": "oxygen", "ipa": "/ˈɑksɪʤən/", "pos": "noun", "endef": "A gas we breathe in that our body needs to stay alive.", "ko": "산소", "kodef": "우리가 숨을 쉴 때 들이마시는, 몸에 꼭 필요한 기체예요.", "ch": 10}, {"en": "pancreas", "ipa": "/ˈpænkriəs/", "pos": "noun", "endef": "An organ that makes digestive juices and sends them to the small intestine to help break down food.", "ko": "이자", "kodef": "소화액을 만들어서 작은창자로 보내고, 음식을 더 잘게 분해하는 것을 도와주는 기관이에요.", "ch": 9}, {"en": "rib", "ipa": "/rɪb/", "pos": "noun", "endef": "One of the curved bones in the chest that surround and protect the heart and lungs.", "ko": "갈비뼈", "kodef": "가슴 안의 심장과 폐를 둘러싸서 지켜 주는 뼈를 말해요.", "ch": 1}, {"en": "saliva", "ipa": "/səˈlaɪvə/", "pos": "noun", "endef": "The liquid in the mouth that makes food soft.", "ko": "침", "kodef": "입안에서 나오는 물로, 음식을 부드럽게 만들어 줘요.", "ch": 7}, {"en": "sense", "ipa": "/sɛns/", "pos": "noun", "endef": "The ability to feel or notice things through the eyes, nose, ears, tongue, and skin.", "ko": "감각", "kodef": "눈, 코, 귀, 혀, 피부 등을 통해 주변을 느끼는 것을 말해요.", "ch": 17}, {"en": "sense organ", "ipa": "/sɛns ˈɔrgən/", "pos": "noun", "endef": "A part of the body, like the eyes, nose, ears, tongue, and skin, that takes in information from the world around us.", "ko": "감각 기관", "kodef": "눈, 코, 귀, 혀, 피부처럼 주변의 정보를 받아들이는 기관이에요.", "ch": 18}, {"en": "skeleton", "ipa": "/ˈskɛlətən/", "pos": "noun", "endef": "All the bones in the body that are connected together to make the body's shape.", "ko": "골격", "kodef": "뼈들이 서로 연결되어 몸의 모양을 이루는 뼈대를 말해요.", "ch": 1}, {"en": "skull", "ipa": "/skəl/", "pos": "noun", "endef": "The round bone in the head that covers and protects the brain.", "ko": "머리뼈", "kodef": "뇌를 감싸서 보호해 주는 둥근 모양의 뼈를 말해요.", "ch": 1}, {"en": "small intestine", "ipa": "/smɔl ˌɪnˈtɛˌstaɪn/", "pos": "noun", "endef": "A long tube below the stomach that absorbs nutrients from food.", "ko": "작은창자", "kodef": "위 아래에 있는 긴 관으로, 음식 속 영양분을 흡수하는 곳이에요.", "ch": 8}, {"en": "solid waste", "ipa": "/ˈsɑləd weɪst/", "pos": "noun", "endef": "The leftover waste from digestion that leaves the body.", "ko": "대변", "kodef": "음식을 소화하고 남은 찌꺼기가 몸 밖으로 나오는 것이에요.", "ch": 14}, {"en": "spine", "ipa": "/spaɪn/", "pos": "noun", "endef": "The long line of bones that runs down the middle of your back.", "ko": "척추", "kodef": "우리 등 한가운데를 따라 길게 줄지어 이어진 뼈예요.", "ch": 3}, {"en": "stimuli", "ipa": "/ˈstɪmjəˌlaɪ/", "pos": "noun", "endef": "Changes from outside the body that our sense organs pick up.", "ko": "자극", "kodef": "감각 기관이 느끼는 바깥의 변화를 말해요.", "ch": 19}, {"en": "stomach", "ipa": "/ˈstəmək/", "pos": "noun", "endef": "A bag-shaped organ below the food pipe that uses digestive juices to break food down into smaller pieces.", "ko": "위", "kodef": "식도 아래에 있는 주머니 모양의 기관으로, 소화액을 내어 음식을 잘게 녹이는 곳이에요.", "ch": 7}, {"en": "sweat", "ipa": "/swɛt/", "pos": "noun", "endef": "The water that comes out of the skin when the body is hot.", "ko": "땀", "kodef": "몸이 더울 때 피부에서 나오는 물이에요.", "ch": 15}, {"en": "sweat gland", "ipa": "/swɛt glænd/", "pos": "noun", "endef": "A tiny structure inside the skin that makes and sends out sweat.", "ko": "땀샘", "kodef": "피부 안에 있는, 땀을 만들어 내보내는 곳이에요.", "ch": 15}, {"en": "taste", "ipa": "/teɪst/", "pos": "noun", "endef": "The flavors we feel with our tongue, such as sweet, salty, sour, and bitter.", "ko": "맛", "kodef": "혀로 느끼는 단맛, 짠맛, 신맛, 쓴맛 등을 말해요.", "ch": 17}, {"en": "tendon", "ipa": "/ˈtɛndən/", "pos": "noun", "endef": "A strong cord that connects a muscle to a bone.", "ko": "힘줄", "kodef": "근육과 뼈를 이어 주는 단단한 끈이에요.", "ch": 5}, {"en": "thigh muscle", "ipa": "/θaɪ ˈməsəl/", "pos": "noun", "endef": "The large muscle in the upper leg that gives strong power for walking and running.", "ko": "허벅지 근육", "kodef": "다리를 움직이고 걷거나 뛸 때 큰 힘을 내 주는 근육을 말해요.", "ch": 2}, {"en": "tongue", "ipa": "/təŋ/", "pos": "noun", "endef": "A sense organ inside the mouth that is used to taste food.", "ko": "혀", "kodef": "입안에 있는 감각 기관으로, 맛을 느끼는 곳이에요.", "ch": 17}, {"en": "upper arm muscle", "ipa": "/ˈəpər ɑrm ˈməsəl/", "pos": "noun", "endef": "The muscle in the upper arm that helps bend and straighten the arm.", "ko": "위팔 근육", "kodef": "팔을 굽히거나 펼 때 사용되는 팔 위쪽의 근육을 말해요.", "ch": 2}, {"en": "urine", "ipa": "/ˈjʊrən/", "pos": "noun", "endef": "The liquid waste filtered by the kidneys that leaves the body.", "ko": "오줌", "kodef": "콩팥이 걸러낸 노폐물이 물과 함께 몸 밖으로 나오는 것이에요.", "ch": 13}, {"en": "villi", "ipa": "/ˈvɪli/", "pos": "noun", "endef": "Tiny bumps packed closely on the inner wall of the small intestine that absorb nutrients into the body. (singular: villus)", "ko": "융털", "kodef": "작은창자 안쪽 벽에 빼곡하게 나 있는 아주 작은 돌기로, 영양분을 몸속으로 흡수하는 역할을 해요.", "ch": 8}, {"en": "waste", "ipa": "/weɪst/", "pos": "noun", "endef": "Useless material made inside the body.", "ko": "노폐물", "kodef": "몸속에서 생긴 쓸모없는 물질이에요.", "ch": 15}, {"en": "waste", "ipa": "/weɪst/", "pos": "noun", "endef": "The leftover material after nutrients have been absorbed.", "ko": "찌꺼기", "kodef": "영양분이 빠지고 남은 나머지를 말해요.", "ch": 8}, {"en": "windpipe", "ipa": "/ˈwɪndˌpaɪp/", "pos": "noun", "endef": "A long tube that carries air from the nose down to the lungs.", "ko": "기관", "kodef": "코로 들어온 공기가 지나가는 긴 관이에요.", "ch": 11}]}, {"id": "math", "en": "Mathematics", "ko": "수학", "count": 73, "entries": [{"en": "acute angle", "ipa": "/əˈkjut ˈæŋgəl/", "pos": "noun", "endef": "An angle that is smaller than a right angle (90°).", "ko": "예각", "kodef": "직각(90°)보다 작은 각을 말해요.", "ch": 7}, {"en": "add", "ipa": "/æd/", "pos": "verb", "endef": "to put numbers together to find the total.", "ko": "더하다", "kodef": "두 개 이상의 수를 합하는 것을 말해요.", "ch": 14}, {"en": "addition", "ipa": "/əˈdɪʃən/", "pos": "noun", "endef": "A calculation that puts numbers together.", "ko": "덧셈", "kodef": "수와 수를 합치는 계산이에요.", "ch": 1}, {"en": "angle", "ipa": "/ˈæŋgəl/", "pos": "noun", "endef": "The size of the opening where two sides meet at a point.", "ko": "각도", "kodef": "두 변이 만나서 벌어진 정도를 말해요.", "ch": 7}, {"en": "area", "ipa": "/ˈɛriə/", "pos": "noun", "endef": "The size of the flat space a figure covers.", "ko": "넓이", "kodef": "도형이 차지하는 평면의 크기를 말해요.", "ch": 10}, {"en": "average", "ipa": "/ˈævərɪʤ/", "pos": "noun", "endef": "the value you get when you add up all the numbers and divide by how many there are.", "ko": "평균", "kodef": "자료의 값을 모두 더한 다음, 자료의 수로 나눈 값을 말해요.", "ch": 14}, {"en": "bar graph", "ipa": "/bɑr græf/", "pos": "noun", "endef": "a graph that shows the number or amount of data using the length of bars.", "ko": "막대그래프", "kodef": "자료의 수나 양을 막대의 길이로 나타낸 그래프를 말해요.", "ch": 19}, {"en": "base amount", "ipa": "/beɪs əˈmaʊnt/", "pos": "noun", "endef": "the amount used as the standard when finding a rate.", "ko": "기준량", "kodef": "비율을 구할 때 나누는 기준이 되는 양을 말해요.", "ch": 15}, {"en": "billion", "ipa": "/ˈbɪljən/", "pos": "noun", "endef": "A number that equals 1,000,000,000. One thousand millions make one billion.", "ko": "십억", "kodef": "1,000,000이 1,000개 모인 수로, 1,000,000,000을 말해요.", "ch": 3}, {"en": "capacity", "ipa": "/kəˈpæsɪti/", "pos": "noun", "endef": "the amount of liquid that a container can hold.", "ko": "들이", "kodef": "그릇이나 용기에 액체가 얼마나 들어가는지를 나타내는 양을 말해요.", "ch": 12}, {"en": "circle graph (pie chart)", "ipa": "/ˈsərkəl græf/", "pos": "noun", "endef": "a graph that uses a circle as the whole and divides it by the ratio of each part.", "ko": "원그래프", "kodef": "원 전체를 100으로 놓고, 각 부분의 비율만큼 나누어서 나타낸 그래프를 말해요.", "ch": 20}, {"en": "cone", "ipa": "/koʊn/", "pos": "noun", "endef": "a solid figure that has one circular base, a curved side, and comes to a point at the top.", "ko": "원뿔", "kodef": "원 모양의 밑면이 하나이고, 옆면이 굽어 있으며, 꼭대기가 한 점으로 모이는 입체도형을 말해요.", "ch": 18}, {"en": "cube", "ipa": "/kjub/", "pos": "noun", "endef": "a rectangular prism where all 6 faces are squares of the same size.", "ko": "정육면체", "kodef": "같은 크기의 정사각형 면 6개로 이루어진 직육면체를 말해요.", "ch": 16}, {"en": "cylinder", "ipa": "/ˈsɪlɪndər/", "pos": "noun", "endef": "a solid figure that has two circles of the same size on the top and bottom and a curved side.", "ko": "원기둥", "kodef": "위아래에 똑같은 크기의 원이 두 개 있고, 옆면이 굽어 있는 입체도형을 말해요.", "ch": 18}, {"en": "decimal", "ipa": "/ˈdɛsəməl/", "pos": "noun", "endef": "A number that uses a decimal point to show a value smaller than 1.", "ko": "소수", "kodef": "1보다 작은 부분을 나타낼 때 쓰는 수예요.", "ch": 5}, {"en": "decimal point", "ipa": "/ˈdɛsəməl pɔɪnt/", "pos": "noun", "endef": "The small dot placed between the whole number part and the part smaller than 1.", "ko": "소수점", "kodef": "1의 자리와 그보다 작은 수 사이에 찍는 점이에요.", "ch": 5}, {"en": "denominator", "ipa": "/dɪˈnɑməˌneɪtər/", "pos": "noun", "endef": "The number below in a fraction that shows into how many equal parts the whole is divided.", "ko": "분모", "kodef": "분수에서 아래에 있는 수로, 전체를 몇 개로 나누었는지를 나타내요.", "ch": 4}, {"en": "diagonal", "ipa": "/daɪˈægənəl/", "pos": "noun", "endef": "A line segment that connects two vertices that are not next to each other in a polygon.", "ko": "대각선", "kodef": "다각형에서 이웃하지 않는 두 꼭짓점을 이은 선분을 말해요.", "ch": 6}, {"en": "distance", "ipa": "/ˈdɪstəns/", "pos": "noun", "endef": "the length that shows how far it is from one place to another.", "ko": "거리", "kodef": "한 곳에서 다른 곳까지 얼마나 떨어져 있는지를 나타내는 길이를 말해요.", "ch": 11}, {"en": "divide", "ipa": "/dɪˈvaɪd/", "pos": "verb", "endef": "to split a number into equal parts by another number.", "ko": "나누다", "kodef": "하나의 수를 다른 수로 똑같이 쪼개는 것을 말해요.", "ch": 14}, {"en": "divide", "ipa": "/dɪˈvaɪd/", "pos": "verb", "endef": "To separate a whole into equal parts. This is the official math term.", "ko": "나누다(divide)", "kodef": "수학에서 전체를 똑같은 크기로 나누는 것을 말해요. 수학에서 쓰는 정식 용어예요.", "ch": 2}, {"en": "division", "ipa": "/dɪˈvɪʒən/", "pos": "noun", "endef": "A calculation that splits a whole into equal parts.", "ko": "나눗셈", "kodef": "전체를 똑같은 크기로 나누는 계산이에요.", "ch": 1}, {"en": "edge", "ipa": "/ɛʤ/", "pos": "noun", "endef": "the line where two faces of a solid figure meet.", "ko": "모서리", "kodef": "입체도형에서 면과 면이 만나는 선을 말해요.", "ch": 16}, {"en": "estimation", "ipa": "/ˌɛstəˈmeɪʃən/", "pos": "noun", "endef": "guessing about how much something is without finding the exact value.", "ko": "어림하기", "kodef": "정확한 값 대신 \"약 얼마쯤\" 되는지 짐작하는 것을 말해요.", "ch": 13}, {"en": "face", "ipa": "/feɪs/", "pos": "noun", "endef": "the flat surface of a solid figure.", "ko": "면", "kodef": "입체도형을 둘러싸고 있는 평평한 부분을 말해요.", "ch": 16}, {"en": "figure", "ipa": "/ˈfɪgjər/", "pos": "noun", "endef": "A shape made of points, lines, and surfaces.", "ko": "도형", "kodef": "점, 선, 면으로 이루어진 모양을 말해요.", "ch": 10}, {"en": "four basic operations", "ipa": "/fɔr ˈbeɪsɪk ˌɑpərˈeɪʃənz/", "pos": "noun", "endef": "The four ways to calculate: addition, subtraction, multiplication, and division.", "ko": "사칙연산", "kodef": "더하기, 빼기, 곱하기, 나누기의 네 가지 계산 방법을 말해요.", "ch": 1}, {"en": "fraction", "ipa": "/ˈfrækʃən/", "pos": "noun", "endef": "A number that shows a part of a whole divided into equal pieces.", "ko": "분수", "kodef": "전체를 똑같이 나눈 것 중 일부를 나타내는 수를 말해요.", "ch": 4}, {"en": "hexagon", "ipa": "/ˈhɛksəˌgɑn/", "pos": "noun", "endef": "A polygon with six sides.", "ko": "육각형", "kodef": "변이 여섯 개인 다각형을 말해요.", "ch": 9}, {"en": "hundred", "ipa": "/ˈhənərd/", "pos": "noun", "endef": "A number that equals 100. Ten tens make one hundred.", "ko": "백", "kodef": "10이 10개 모인 수로, 100을 말해요.", "ch": 3}, {"en": "hundred million", "ipa": "/ˈhənərd ˈmɪljən/", "pos": "noun", "endef": "A number made by putting 10,000 groups of ten thousand together, which is 100,000,000.", "ko": "억", "kodef": "10,000이 10,000개 모인 수로, 100,000,000을 말해요.", "ch": 3}, {"en": "leftover", "ipa": "/ˈlɛfˌtoʊvər/", "pos": "noun", "endef": "The amount that remains after dividing equally. This is an everyday English expression.", "ko": "나머지(left over)", "kodef": "나눗셈에서 똑같이 나누고도 남아 있는 수를 말해요. 일상생활에서 쓰는 표현이에요.", "ch": 2}, {"en": "length", "ipa": "/lɛŋθ/", "pos": "noun", "endef": "the measure of how long something is from one end to the other.", "ko": "길이", "kodef": "물건의 한쪽 끝에서 다른 쪽 끝까지 얼마나 긴지를 나타내는 것을 말해요.", "ch": 11}, {"en": "line graph", "ipa": "/laɪn græf/", "pos": "noun", "endef": "a graph that shows how data changes by connecting dots with lines.", "ko": "꺾은선그래프", "kodef": "자료의 변화를 점과 선으로 이어서 나타낸 그래프를 말해요.", "ch": 19}, {"en": "line segment", "ipa": "/laɪn ˌsɛgˈmɛnt/", "pos": "noun", "endef": "A straight line that connects two points.", "ko": "선분", "kodef": "두 점을 곧게 이은 선을 말해요.", "ch": 6}, {"en": "million", "ipa": "/ˈmɪljən/", "pos": "noun", "endef": "A number that equals 1,000,000. One thousand thousands make one million.", "ko": "백만", "kodef": "1,000이 1,000개 모인 수로 1,000,000을 말해요.", "ch": 3}, {"en": "multiplication", "ipa": "/ˌməltəpləˈkeɪʃən/", "pos": "noun", "endef": "A shorter way to add the same number many times.", "ko": "곱셈", "kodef": "같은 수를 여러 번 더하는 것을 간단하게 나타낸 계산이에요.", "ch": 1}, {"en": "numerator", "ipa": "/ˈnumərˌeɪtər/", "pos": "noun", "endef": "The number above in a fraction that shows how many parts you have.", "ko": "분자", "kodef": "분수에서 위에 있는 수로, 전체에서 몇 개를 가졌는지를 나타내요.", "ch": 4}, {"en": "obtuse angle", "ipa": "/ɑbˈtus ˈæŋgəl/", "pos": "noun", "endef": "An angle that is larger than a right angle (90°).", "ko": "둔각", "kodef": "직각(90°)보다 큰 각을 말해요.", "ch": 7}, {"en": "octagon", "ipa": "/ˈɑktəˌgɑn/", "pos": "noun", "endef": "A polygon with eight sides.", "ko": "팔각형", "kodef": "변이 여덟 개인 다각형을 말해요.", "ch": 9}, {"en": "parallelogram", "ipa": "/ˌpærəˈlɛləˌɡræm/", "pos": "noun", "endef": "A quadrilateral with two pairs of opposite sides that are both parallel.", "ko": "평행사변형", "kodef": "마주 보는 두 쌍의 변이 모두 나란한 사각형을 말해요.", "ch": 8}, {"en": "pentagon", "ipa": "/ˈpɛnɪˌgɑn/", "pos": "noun", "endef": "A polygon with five sides.", "ko": "오각형", "kodef": "변이 다섯 개인 다각형을 말해요.", "ch": 9}, {"en": "pentagonal", "ipa": "/pɛnˈtæɡənəl/", "pos": "adjective", "endef": "having the shape of a pentagon.", "ko": "오각형의", "kodef": "오각형 모양을 가진 것을 말해요.", "ch": 17}, {"en": "perimeter", "ipa": "/pərˈɪmətər/", "pos": "noun", "endef": "The total length around the edge of a figure.", "ko": "둘레", "kodef": "도형의 테두리를 따라 한 바퀴 돈 길이를 말해요.", "ch": 10}, {"en": "polygon", "ipa": "/ˈpɑlɪˌgɑn/", "pos": "noun", "endef": "a flat shape surrounded by three or more straight lines.", "ko": "다각형", "kodef": "세 개 이상의 직선으로 둘러싸인 평면도형을 말해요.", "ch": 17}, {"en": "prism", "ipa": "/ˈprɪzəm/", "pos": "noun", "endef": "a solid figure that has two polygon-shaped bases facing each other and all rectangular side faces.", "ko": "각기둥", "kodef": "다각형 모양의 밑면 두 개가 서로 마주 보고 있고, 옆면이 모두 직사각형인 입체도형을 말해요.", "ch": 17}, {"en": "proportion", "ipa": "/prəˈpɔrʃən/", "pos": "noun", "endef": "the value you get when you divide a part by the whole.", "ko": "비율", "kodef": "부분을 전체로 나눈 값이에요.", "ch": 15}, {"en": "pyramid", "ipa": "/ˈpɪrəmɪd/", "pos": "noun", "endef": "a solid figure that has one polygon-shaped base, all triangular side faces, and a point at the top.", "ko": "각뿔", "kodef": "다각형 모양의 밑면이 하나이고, 옆면이 모두 삼각형이며, 꼭대기에서 한 점으로 모이는 입체도형을 말해요.", "ch": 17}, {"en": "quadrilateral", "ipa": "/ˌkwɑdrɪˈlætərəl/", "pos": "noun", "endef": "A shape with four sides.", "ko": "사각형", "kodef": "변이 네 개인 도형을 말해요.", "ch": 8}, {"en": "quotient", "ipa": "/kˈwoʊʃənt/", "pos": "noun", "endef": "The number you get as a result of dividing.", "ko": "몫", "kodef": "나눗셈에서 나눈 결과로 나오는 수를 말해요.", "ch": 2}, {"en": "ratio", "ipa": "/ˈreɪʃiˌoʊ/", "pos": "noun", "endef": "a way of comparing two numbers by showing them as \"how many to how many.\"", "ko": "비", "kodef": "두 수를 \"몇 대 몇\"으로 비교하여 나타낸 것을 말해요.", "ch": 15}, {"en": "rectangle", "ipa": "/ˈrɛktæŋgəl/", "pos": "noun", "endef": "A quadrilateral with all four right angles.", "ko": "직사각형", "kodef": "네 각이 모두 직각인 사각형을 말해요.", "ch": 8}, {"en": "rectangular", "ipa": "/rɛkˈtæŋgjələr/", "pos": "adjective", "endef": "having the shape of a rectangle.", "ko": "직사각형의", "kodef": "직사각형 모양을 가진 것을 말해요.", "ch": 17}, {"en": "rectangular prism", "ipa": "/rɛkˈtæŋgjələr ˈprɪzəm/", "pos": "noun", "endef": "a solid figure surrounded by 6 rectangular faces.", "ko": "직육면체", "kodef": "직사각형 모양의 면 6개로 둘러싸인 입체도형을 말해요.", "ch": 16}, {"en": "remainder", "ipa": "/rɪˈmeɪndər/", "pos": "noun", "endef": "The number that is left over when things do not divide evenly. This is the official math term.", "ko": "나머지(remainder)", "kodef": "나눗셈에서 딱 맞게 나누어지지 않을 때 생기는 남는 수를 말해요. 수학에서 쓰는 정식 용어예요.", "ch": 2}, {"en": "rhombus", "ipa": "/ˈrɑmbəs/", "pos": "noun", "endef": "A quadrilateral with all four sides the same length.", "ko": "마름모", "kodef": "네 변의 길이가 모두 같은 사각형을 말해요.", "ch": 8}, {"en": "right angle", "ipa": "/raɪt ˈæŋgəl/", "pos": "noun", "endef": "An angle that is exactly 90°.", "ko": "직각", "kodef": "벌어진 정도가 딱 90°인 각을 말해요.", "ch": 7}, {"en": "rounding", "ipa": "/ˈraʊndɪŋ/", "pos": "noun", "endef": "a way of showing a number as a nearby larger or smaller number.", "ko": "반올림", "kodef": "어떤 수를 가까운 큰 수나 작은 수로 나타내는 방법을 말해요.", "ch": 13}, {"en": "rounding down", "ipa": "/ˈraʊndɪŋ daʊn/", "pos": "noun", "endef": "A way of dropping the digits below the rounding place and keeping the number the same.", "ko": "버림", "kodef": "반올림할 때 구하려는 자리 아래 숫자가 작아서 그 수를 없애는 것을 말해요.", "ch": 13}, {"en": "rounding up", "ipa": "/ˈraʊndɪŋ əp/", "pos": "noun", "endef": "A way of dropping the digits below the rounding place and adding one to the rounding place.", "ko": "올림", "kodef": "반올림할 때 구하려는 자리 아래 숫자가 커서 윗자리 수를 하나 올리는 것을 말해요.", "ch": 13}, {"en": "side", "ipa": "/saɪd/", "pos": "noun", "endef": "A straight line segment that makes up part of a figure.", "ko": "변", "kodef": "도형에서 곧은 선분으로 이루어진 부분을 말해요.", "ch": 6}, {"en": "solid figure", "ipa": "/ˈsɑləd ˈfɪgjər/", "pos": "noun", "endef": "a figure that has length, width, and height and takes up space.", "ko": "입체도형", "kodef": "길이, 너비, 높이가 있어서 공간에서 자리를 차지하는 도형을 말해요.", "ch": 16}, {"en": "sphere", "ipa": "/sfɪr/", "pos": "noun", "endef": "a solid figure that looks like a perfect circle from every direction and has a completely round surface.", "ko": "구", "kodef": "어느 방향에서 보아도 똑같은 원 모양이고, 표면이 완전히 둥근 입체도형을 말해요.", "ch": 18}, {"en": "square", "ipa": "/skwɛr/", "pos": "noun", "endef": "A quadrilateral with all four right angles and all four sides the same length.", "ko": "정사각형", "kodef": "네 각이 모두 직각이면서 네 변의 길이가 모두 같은 사각형을 말해요.", "ch": 8}, {"en": "strip graph", "ipa": "/strɪp græf/", "pos": "noun", "endef": "a graph that uses a long rectangular strip as the whole and divides it by the ratio of each part.", "ko": "띠그래프", "kodef": "긴 띠 모양의 직사각형을 전체로 놓고, 각 부분의 비율만큼 나누어서 나타낸 그래프를 말해요.", "ch": 20}, {"en": "subtraction", "ipa": "/səbˈtrækʃən/", "pos": "noun", "endef": "A calculation that takes a number away from another.", "ko": "뺄셈", "kodef": "수에서 다른 수를 덜어 내는 계산이에요.", "ch": 1}, {"en": "ten thousand", "ipa": "/tɛn ˈθaʊzənd/", "pos": "noun", "endef": "A number made by putting 10 groups of 1,000 together, which is 10,000.", "ko": "만", "kodef": "1,000이 10개 모인 수로, 10,000을 말해요.", "ch": 3}, {"en": "thousand", "ipa": "/ˈθaʊzənd/", "pos": "noun", "endef": "A number that equals 1,000. Ten hundreds make one thousand.", "ko": "천", "kodef": "100이 10개 모인 수로, 1,000을 말해요.", "ch": 3}, {"en": "trapezoid", "ipa": "/ˈtræpəˌzɔɪd/", "pos": "noun", "endef": "A quadrilateral with one pair of opposite sides that are parallel.", "ko": "사다리꼴", "kodef": "마주 보는 한 쌍의 변이 나란한 사각형을 말해요.", "ch": 8}, {"en": "triangular", "ipa": "/traɪˈæŋgjələr/", "pos": "adjective", "endef": "having the shape of a triangle.", "ko": "삼각형의", "kodef": "삼각형 모양을 가진 것을 말해요.", "ch": 17}, {"en": "trillion", "ipa": "/ˈtrɪljən/", "pos": "noun", "endef": "A number that equals 1,000,000,000,000. One thousand billions make one trillion.", "ko": "조", "kodef": "1,000,000,000이 1,000개 모인 수로, 1,000,000,000,000을 말해요.", "ch": 3}, {"en": "vertex", "ipa": "/ˈvərˌtɛks/", "pos": "noun", "endef": "the point where two or more edges of a solid figure meet.", "ko": "꼭짓점", "kodef": "입체도형에서 모서리와 모서리가 만나는 점을 말해요.", "ch": 16}, {"en": "vertices", "ipa": "/ˈvərtɪˌsiz/", "pos": "noun", "endef": "More than one vertex.", "ko": "꼭짓점들", "kodef": "꼭짓점이 여러 개일 때 쓰는 말이에요.", "ch": 6}]}];
const POSKO = {noun:'명사',verb:'동사',adjective:'형용사',adverb:'부사',
  'noun phrase':'명사','verb phrase':'동사','adjective phrase':'형용사'};
let curVol = DATA[0].id, query = '';

const esc = s => (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function speak(word, slow){
  if(!('speechSynthesis' in window)){alert('이 브라우저는 발음 재생을 지원하지 않아요.');return;}
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US'; u.rate = slow ? 0.55 : 1;
  const v = speechSynthesis.getVoices().find(v=>/en[-_]US/i.test(v.lang));
  if(v) u.voice = v;
  speechSynthesis.cancel(); speechSynthesis.speak(u);
}

function curEntries(){
  const vol = DATA.find(v=>v.id===curVol);
  const q = query.trim().toLowerCase();
  let e = vol.entries;
  if(q) e = e.filter(x=>x.en.toLowerCase().includes(q) || (x.ko||'').includes(query.trim()));
  return e;
}

function render(){
  const list = document.getElementById('list');
  const entries = curEntries();
  document.getElementById('count').textContent = entries.length + ' 단어';
  if(!entries.length){ list.innerHTML = '<div class="empty">검색 결과가 없어요.<br>다른 단어로 찾아보세요.</div>'; buildRail([]); return; }
  const groups = {};
  entries.forEach(e=>{ const L=e.en[0].toUpperCase(); (groups[L]=groups[L]||[]).push(e); });
  const letters = Object.keys(groups).sort();
  let html = '';
  letters.forEach(L=>{
    html += `<section class="alpha" id="grp-${L}"><span class="L">${L}</span><span class="n">${groups[L].length} 단어</span></section>`;
    groups[L].forEach(e=>{
      const posko = POSKO[e.pos] || e.pos || '';
      const ch = e.ch ? `<span class="ch">Ch.${e.ch}</span>` : '';
      html += `<article class="entry">
        <div class="headline">
          <span class="term">${esc(e.en)}</span>
          <span class="btns">
            <button class="play" data-w="${esc(e.en)}" aria-label="${esc(e.en)} 발음 듣기">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M11 5 6 9H3v6h3l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
            <button class="slow" data-w="${esc(e.en)}" data-slow="1" aria-label="${esc(e.en)} 느리게 듣기">느리게</button>
          </span>
          ${ch}
        </div>
        <div class="phon">${esc(e.ipa)}<span class="pos">${esc(e.pos)}</span></div>
        <div class="endef">${esc(e.endef)}</div>
        <div class="kodef"><span class="kw">${esc(e.ko)}</span> <span class="kp">(${posko})</span> — ${esc(e.kodef)}</div>
      </article>`;
    });
  });
  list.innerHTML = html;
  buildRail(letters);
}

function buildRail(activeLetters){
  const rail = document.getElementById('rail');
  const set = new Set(activeLetters);
  let html='';
  for(let i=65;i<=90;i++){ const L=String.fromCharCode(i);
    html += `<button ${set.has(L)?'':'disabled'} data-jump="${L}">${L}</button>`; }
  rail.innerHTML = html;
}

function buildTabs(){
  const t = document.getElementById('tabs');
  t.innerHTML = DATA.map(v=>
    `<button class="tab" role="tab" data-vol="${v.id}" aria-selected="${v.id===curVol}">${v.ko}<span class="en">${v.en}</span></button>`).join('');
}

document.getElementById('tabs').addEventListener('click', e=>{
  const b = e.target.closest('.tab'); if(!b) return;
  curVol = b.dataset.vol; query=''; document.getElementById('q').value='';
  document.querySelectorAll('.tab').forEach(x=>x.setAttribute('aria-selected', x.dataset.vol===curVol));
  render(); window.scrollTo({top:0});
});
document.getElementById('q').addEventListener('input', e=>{ query=e.target.value; render(); });
document.getElementById('list').addEventListener('click', e=>{
  const b = e.target.closest('button[data-w]'); if(!b) return;
  speak(b.dataset.w, b.dataset.slow==='1');
});
document.getElementById('rail').addEventListener('click', e=>{
  const b = e.target.closest('button[data-jump]'); if(!b||b.disabled) return;
  const el = document.getElementById('grp-'+b.dataset.jump); if(el) el.scrollIntoView({block:'start'});
});
if('speechSynthesis' in window) speechSynthesis.onvoiceschanged = ()=>{};

// --- in-app browser detection (no speech synthesis support) ---
(function(){
  var ua = navigator.userAgent || '';
  var inApp = /KAKAOTALK|NAVER|Line\/|FBAN|FBAV|FB_IAB|Instagram|DaumApps|band|everytime|KAKAOSTORY|; wv\)/i.test(ua);
  if(!inApp) return;
  try{ if(sessionStorage.getItem('iabHide')) return; }catch(e){}
  var b = document.getElementById('iabBanner');
  var msg = b.querySelector('.iab-msg');
  var btn = document.getElementById('iabOpen');
  if(/Android/i.test(ua)){
    msg.innerHTML = '\uD83D\uDD0A \uBC1C\uC74C\uC744 \uB4E4\uC73C\uB824\uBA74 Chrome\uC5D0\uC11C \uC5F4\uC5B4\uC8FC\uC138\uC694<small>\uBC84\uD2BC\uC774 \uC548 \uB418\uBA74 \uC6B0\uCE21 \uBA54\uB274 \u2192 \uB2E4\uB978 \uBE0C\uB77C\uC6B0\uC800\uB85C \uC5F4\uAE30</small>';
    btn.onclick = function(){
      var u = location.host + location.pathname + location.search;
      location.href = 'intent://' + u + '#Intent;scheme=https;package=com.android.chrome;end';
    };
  } else {
    btn.hidden = true;
    msg.innerHTML = '\uD83D\uDD0A \uBC1C\uC74C\uC744 \uB4E4\uC73C\uB824\uBA74 \uC6B0\uCE21 \uBA54\uB274 \u2192 "Safari\uB85C \uC5F4\uAE30"\uB97C \uB20C\uB7EC\uC8FC\uC138\uC694';
  }
  b.hidden = false;
  document.getElementById('iabClose').onclick = function(){
    b.hidden = true; try{ sessionStorage.setItem('iabHide','1'); }catch(e){}
  };
})();

buildTabs(); render();
</script>
</body>
</html>
